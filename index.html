<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLE 电子纸</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
</head>

<body>

  <!-- 顶部状态条 -->
  <div id="topStatusBar">
    <div id="statusButtons">
      <button class="status-btn" data-target="window1">
        <span class="status-dot"></span>
        <span class="status-text">建设中</span>
      </button>
      <button class="status-btn" data-target="window2">
        <span class="status-dot"></span>
        <span class="status-text">建设中</span>
      </button>
    </div>
    <div id="advancedToggle">
      <span>高级模式</span>
      <label class="toggle-switch">
        <input type="checkbox" id="advancedMode">
        <span class="toggle-thumb"></span>
      </label>
    </div>
  </div>

  <!-- 弹窗1 -->
  <div id="window1" class="status-window">
    <form>
      <div class="window-row" id="bleFilter">
        <label for="allDevices">All Devices</label>
        <input id="allDevices" type="checkbox">
      </div>
      <div class="window-row">
        <label for="service">Service</label>
        <input id="service" type="text" placeholder="Bluetooth Service" value="0x00FF">
      </div>
      <div class="window-row">
        <label for="characteristic">Char</label>
        <input id="characteristic" type="text" placeholder="Bluetooth Characteristic">
      </div>
      <div class="window-row">
        <label for="namePrefix">Prefix</label>
        <input id="namePrefix" type="text" placeholder="Device Name Prefix" value="YES">
      </div>
      <input id="name" type="text" placeholder="Device Name" hidden>
      <div id="bleStatusIndicator" class="ble-status">
        <span class="status-dot"></span>
        <span class="status-text">蓝牙未连接</span>
      </div>
      <div class="window-row">
        <label id="bleDeviceLabel">Scan Bluetooth Devices</label>
        <button type="button" id="scanBLEBtn">Scan</button>
      </div>
    </form>
  </div>

  <!-- 弹窗2 -->
  <div id="window2" class="status-window">
    <div class="window-row">
      <label>连接状态</label>
      <span>已连接</span>
    </div>
    <div class="window-row">
      <label>IP地址</label>
      <input type="text" placeholder="192.168.1.1">
    </div>
    <div class="window-row">
      <label>自动重连</label>
      <label class="toggle-switch">
        <input type="checkbox">
        <span class="toggle-thumb"></span>
      </label>
    </div>
  </div>

  <div id="mainContainer">

    <!-- 传输进度遮罩 -->
    <div id="transferOverlay" class="overlay" style="display:none;">
      <div id="loaderBox" class="loader-container">
        <div class="spinner">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="loader-text">
          <div id="loaderProgress">0%</div>
          <div id="loaderTime">0.0s</div>
        </div>
        <div id="statusText" class="status-msg"></div>
      </div>
    </div>

    <h1>Web BLE 电子纸</h1>

    <!-- ── 蓝牙 ─────────────────────────────────────────────── -->
    
    <br>
    <!-- ── WiFi ──────────────────────────────────────────────── -->
    <div id="wifiInfo" class="control-group">
      <div class="row">
        <label>SSID:</label> <input id="ssid" type="text" value="Outside">
        <label>Password:</label> <input id="password" type="text" value="yeslcd123">
      </div>
      <div class="row">
        <label>IP:</label>
        <input id="ipAddress" type="text" readonly>
        <button id="getIPBtn">Get IP</button>
        <button id="setWifiBtn">Set WiFi</button>
      </div>
    </div>

    <br>
    <!-- ── 设备配置 ───────────────────────────────────────────── -->
    <div id="setdevice" class="control-group">
      <div class="row">
        <label>Model Name:</label>
        <select id="modelSet"></select>
        <button id="setdeviceBtn">Set Device</button>
      </div>
      <div class="row">
        <label>Custom Name:</label>
        <input id="customName" type="text" placeholder="Custom Name">
        <button id="setCustomNameBtn">Set Custom Name</button>
      </div>
      <div class="row">
        <label>工作模式:</label>
        <select id="woringModeSet">
          <option value="0">0: 正常模式</option>
          <option value="1">1: 相册模式</option>
        </select>
        <button id="setModeBtn">Set Mode</button>
      </div>
    </div>

    <br>
    <!-- ── 设备信息（只读） ──────────────────────────────────── -->
    <div id="deviceInfo" class="control-group">
      <div class="row">
        <label>型号:</label>
        <input id="modelGet" type="text" readonly>
        <button id="getinfobtn" hidden>Get Info</button>
      </div>
      <div class="row">
        <label>宽:</label> <input id="width" type="text" readonly>
        <label>高:</label> <input id="height" type="text" readonly>
        <label>BPP:</label> <input id="BPP" type="text" readonly>
      </div>
      <div class="row">
        <label>调色板:</label>
        <span id="paletteContainer" style="display:inline-flex;gap:5px;margin-left:10px;">
          <div style="width:20px;height:20px;background:#FF0000;"></div>
          <div style="width:20px;height:20px;background:#00FF00;"></div>
          <div style="width:20px;height:20px;background:#0000FF;"></div>
          <div style="width:20px;height:20px;background:#FFFFFF;"></div>
          <div style="width:20px;height:20px;background:#000000;"></div>
        </span>
        <button id="ClearBtn">Clear Screen</button>
      </div>
    </div>

    <br>
    <!-- ════════════════════════════════════════════════════════
         图片操作区
    ════════════════════════════════════════════════════════ -->
    <div id="imageSection">

      <!-- 工具栏 -->
      <div id="imageToolbar">
        <div>
          <button id="uploadImageBtn">📂 选择图片</button>
          <input type="file" id="imageInput" accept="image/*" style="display:none">
        </div>
        <div id="flipControl">
          <button type="button" id="flipHorizontal">
            ↔️ 水平镜像
          </button>
          <button type="button" id="flipVertical">
            ↕️ 垂直镜像
          </button>
        </div>
        <div>
          <button type="button" id="rotateLeft">
            ↪️ 逆时针 90°
          </button>
          <button type="button" id="rotateRight">
            ↩️ 顺时针 90°
          </button>
        </div>

      </div>

      <div id="imagePreviews">

        <!-- 左：裁剪框 -->
        <div class="square-box" id="cropperBox">
          <div class="placeholder" id="cropperPlaceholder">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1"
              opacity="0.4">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M3 9h18M9 21V9" />
            </svg>
            <span>点击"选择图片"上传</span>
          </div>
          <!-- Cropper 会接管这个 img -->
          <img id="cropperImage" style="display:none; max-width:100%; max-height:100%;" alt="">
        </div>

        <!-- 右：量化预览 -->
        <div class="square-box" id="quantizedBox">
          <div class="placeholder" id="quantizedPlaceholder">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1"
              opacity="0.4">
              <rect x="2" y="2" width="9" height="9" />
              <rect x="13" y="2" width="9" height="9" />
              <rect x="2" y="13" width="9" height="9" />
              <rect x="13" y="13" width="9" height="9" />
            </svg>
            <span>量化预览</span>
          </div>
          <img id="quantizedImage" alt="量化图">
        </div>

      </div><!-- #imagePreviews -->
    </div><!-- #imageSection -->

    <!-- ── 旋转控制 ──────────────────────────────────────────── -->


    <!-- ── 图像调整参数 ─────────────────────────────────────── -->
    <div class="adjust-controls" style="margin-top:12px;">
      <label class="lut-label">
        色彩增强 (LUT) <input type="checkbox" id="useLutCheckbox" checked>
      </label>
      <div class="slider-row">
        <label>亮度 <span id="brightnessVal">0</span></label>
        <button class="step-btn" data-target="brightness" data-step="-1">−</button>
        <input type="range" id="brightness" min="-100" max="100" value="0">
        <button class="step-btn" data-target="brightness" data-step="1">+</button>
      </div>
      <div class="slider-row">
        <label>对比度 <span id="contrastVal">0</span></label>
        <button class="step-btn" data-target="contrast" data-step="-1">−</button>
        <input type="range" id="contrast" min="-100" max="100" value="0">
        <button class="step-btn" data-target="contrast" data-step="1">+</button>
      </div>
    </div>

    <!-- ── 高级图像操作 ──────────────────────────────────────── -->
    <div id="advancedImageOps" style="margin-top:10px;" class="control-group">
      <button id="exportBinBtn">Export Bin</button>
      <button id="importBinBtn">Import Bin</button>
      <input type="file" id="fileInput" style="display:none;" accept=".bin">
      <button id="quantizedImagebtn">Quantized Image</button>
    </div>

    <br><br>
    <button id="saveToFlashBtn" class="btn">保存到 Flash</button>
    <button id="clearFlashBtn" class="btn" style="background-color:#e74c3c;">清空 Flash 图片</button>
    <button id="sendBtnBle">Send Image (Bluetooth)</button>
    <button id="sendBtnIP">Send Image (IP)</button>

    <br><br><br><br><br>
    <footer style="text-align:center;margin-top:20px;font-size:14px;">
      <span>Powered by</span>
      <a href="https://www.yes-lcd.com/" target="_blank" style="vertical-align:middle;text-decoration:none;">
        <img src="assets/yes-lcd.jpg" alt="yes-lcd" style="height:32px;margin-left:5px;">
      </a>
      <a href="https://www.newface-epd.com" target="_blank" style="vertical-align:middle;text-decoration:none;">
        <img src="assets/newface-epd.png" alt="newface-epd" style="height:32px;margin-left:5px;">
      </a>
    </footer>
    <br><br><br><br>

    <div id="status">状态：等待操作...</div>

  </div><!-- #mainContainer -->

  <!-- ── 第三方库 ──────────────────────────────────────────── -->
  <script src="libs/RgbQuant/src/rgbquant.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

  <!-- ── 蓝牙底层 & 协议层 ──────────────────────────────────── -->
  <script src="蓝牙操作.js"></script>
  <script src="协议.js"></script>

  <!-- ── UI 主逻辑 ─────────────────────────────────────────── -->
  <script>
    /* ══════════════════════════════════════════════════════════
     *  应用状态
     * ══════════════════════════════════════════════════════════ */
    let LUT_DATA = null;     // ArrayBuffer — LUT 色彩查找表
    let useLut = true;
    let devicePalette = [];       // [[r,g,b], ...]
    let outputData = null;     // Uint8Array  — 最终打包的图像数据
    let selectedPaletteIndex = 0;

    /** 当前 Cropper.js 实例 */
    let cropperInstance = null;

    /* ══════════════════════════════════════════════════════════
     *  BLE / 协议库初始化
     * ══════════════════════════════════════════════════════════ */
    BLE.init({
      log,
      onStatusChange: updateBleStatus,
      onNotification: (event) => {
        const r = EPD.handleNotification(event);
        log(r.message);
      },
    });
    EPD.init({ log });

    const modelSelect = document.getElementById('modelSet');
    EPD.MODEL_LIST.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      modelSelect.appendChild(opt);
    });

    /* ══════════════════════════════════════════════════════════
     *  进度遮罩层
     * ══════════════════════════════════════════════════════════ */
    const overlay = {
      get el() { return document.getElementById('transferOverlay'); },
      get box() { return document.getElementById('loaderBox'); },
      get progress() { return document.getElementById('loaderProgress'); },
      get time() { return document.getElementById('loaderTime'); },
      get status() { return document.getElementById('statusText'); },
      startTime: 0, timerInterval: null,

      show() {
        if (!this.el) return;
        this.box.className = 'loader-container';
        this.el.classList.remove('hidden');
        this.el.style.display = 'flex';
        this.status.innerText = '';
        this.progress.style.display = 'block';
        this.startTime = Date.now();
        this.timerInterval = setInterval(() => {
          this.time.innerText = `${((Date.now() - this.startTime) / 1000).toFixed(1)}s`;
        }, 100);
      },
      update(percent) { if (this.progress) this.progress.innerText = `${percent}%`; },
      async complete(msg = '传输成功') {
        clearInterval(this.timerInterval);
        this.box.classList.add('success');
        this.status.innerText = `✅ ${msg}`;
        this.progress.style.display = 'none';
        await new Promise(r => setTimeout(r, 2000));
        this.el.classList.add('hidden');
        setTimeout(() => this.el.style.display = 'none', 500);
      },
      async fail(msg = '传输失败') {
        clearInterval(this.timerInterval);
        if (!this.box) return;
        this.box.classList.add('warning');
        this.status.innerText = `⚠️ ${msg}`;
        this.progress.style.display = 'none';
        await new Promise(r => setTimeout(r, 2000));
        this.el.classList.add('hidden');
        setTimeout(() => this.el.style.display = 'none', 500);
      }
    };

    /* ══════════════════════════════════════════════════════════
     *  工具函数
     * ══════════════════════════════════════════════════════════ */
    function log(...args) {
      const statusDiv = document.getElementById('status');
      const now = new Date();
      const ts = `[${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}.${pad3(now.getMilliseconds())}]`;
      const msg = args.map(a => {
        try { return typeof a === 'object' && a !== null ? JSON.stringify(a, null, 2) : String(a); }
        catch (e) { return '[Unserializable]'; }
      }).join(' ');
      if (statusDiv) {
        const line = document.createElement('div');
        line.textContent = ` ${ts} ${msg}`;
        line.style.cssText = 'font-family:monospace;font-size:0.95em;';
        statusDiv.appendChild(line);
        statusDiv.scrollTop = statusDiv.scrollHeight;
      } else {
        console.log(`${ts} ${msg}`);
      }
    }
    const pad = n => String(n).padStart(2, '0');
    const pad3 = n => String(n).padStart(3, '0');

    function updateBleStatus(state, deviceName) {
      const dot = document.querySelector('.status-dot');
      const text = document.querySelector('.status-text');
      const deviceLabel = document.getElementById('bleDeviceLabel');
      if (!dot || !text) return;
      dot.classList.remove('connected', 'connecting');
      const map = {
        connecting: ['connecting', '蓝牙连接中...'],
        connected: ['connected', '蓝牙已连接'],
        disconnected: [null, '蓝牙未连接'],
        error: [null, '蓝牙连接出错'],
      };
      const [cls, label] = map[state] || [null, state];
      if (cls) dot.classList.add(cls);
      text.textContent = label;
      if (state === 'connected' && deviceName && deviceLabel) {
        deviceLabel.textContent = deviceName;
      } else if (state === 'disconnected' && deviceLabel) {
        deviceLabel.textContent = 'Scan Bluetooth Devices';
      }
    }

    /** 把设备信息写入 UI，并在必要时刷新 Cropper 比例 */
    function applyDeviceInfoToUI(info) {
      document.getElementById('modelGet').value = info.name;
      document.getElementById('width').value = info.width;
      document.getElementById('height').value = info.height;
      document.getElementById('BPP').value = info.bpp;
      devicePalette = info.palette;

      // 更新尺寸标注
      const label = document.getElementById('cropDimLabel');
      if (label) {
        label.textContent = info.width && info.height
          ? `屏幕尺寸: ${info.width} × ${info.height} px`
          : '— 请先连接设备以获取屏幕尺寸 —';
      }

      // 渲染调色板
      const pc = document.getElementById('paletteContainer');
      if (pc && info.palette.length) {
        pc.innerHTML = '';
        info.palette.forEach((rgb, idx) => {
          const box = document.createElement('div');
          box.className = 'palette-item';
          box.style.backgroundColor = `rgb(${rgb.join(',')})`;
          box.dataset.index = idx;
          if (idx === selectedPaletteIndex) box.classList.add('selected');
          box.onclick = () => {
            document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('selected'));
            box.classList.add('selected');
            selectedPaletteIndex = idx;
            log(`已选中调色板颜色索引: ${idx}`);
          };
          pc.appendChild(box);
        });
      }

      // 如果图片已加载，用新比例刷新 Cropper
      if (cropperInstance) {
        refreshCropperAspectRatio(info.width, info.height);
      }

      log('✅ UI 设备信息更新完成');
    }

    /* ══════════════════════════════════════════════════════════
     *  Cropper.js 管理
     * ══════════════════════════════════════════════════════════ */

    /**
     * 计算裁剪框在正方形容器中的尺寸和位置
     *
     * 规则：
     *   - 取设备长宽中的大者，令其覆盖容器（正方形边长 S）的 90%
     *   - 小者按屏幕宽高比推导
     *   - 裁剪框居中放置
     *
     * @param {number} containerW  容器宽（= 容器高，正方形）
     * @param {number} deviceW     设备屏幕宽
     * @param {number} deviceH     设备屏幕高
     * @returns {{ left, top, width, height }}
     */
    function calcCropBoxData(containerW, deviceW, deviceH) {
      const S = containerW;         // 正方形边长
      const target = S * 0.9;       // 大边目标长度

      let cropW, cropH;
      if (deviceW >= deviceH) {
        cropW = target;
        cropH = target * (deviceH / deviceW);
      } else {
        cropH = target;
        cropW = target * (deviceW / deviceH);
      }

      return {
        width: cropW,
        height: cropH,
        left: (S - cropW) / 2,
        top: (S - cropH) / 2,
      };
    }

    /**
     * 首次（或替换图片时）初始化 Cropper
     * @param {HTMLImageElement} imgEl
     */
    function initCropper(imgEl) {
      if (cropperInstance) {
        cropperInstance.destroy();
        cropperInstance = null;
      }

      const deviceW = parseInt(document.getElementById('width').value) || 0;
      const deviceH = parseInt(document.getElementById('height').value) || 0;
      const hasSize = deviceW > 0 && deviceH > 0;

      cropperInstance = new Cropper(imgEl, {
        viewMode: 1,        // 不允许裁剪框超出图片范围
        dragMode: 'move',   // 拖拽移动图片
        aspectRatio: hasSize ? deviceW / deviceH : NaN,
        autoCropArea: 0.9,      // 初始自动覆盖 90%（ready 后会精确覆盖）
        movable: true,
        zoomable: true,
        rotatable: true,
        scalable: true,
        cropBoxMovable: false,    // fixed crop box：框不可拖动
        cropBoxResizable: false,    // fixed crop box：框不可缩放
        guides: true,
        center: true,
        highlight: true,
        background: true,

        ready() {
          // 精确设置裁剪框
          if (hasSize) {
            const container = cropperInstance.getContainerData();
            cropperInstance.setCropBoxData(
              calcCropBoxData(container.width, deviceW, deviceH)
            );
          }
          scheduleQuantize();
        },

        // 拖动/缩放时触发防抖量化
        cropmove() { scheduleQuantize(); },
        cropend() { scheduleQuantize(); },
        zoom() { scheduleQuantize(); },
      });

      imgEl.style.display = 'block';
      const ph = document.getElementById('cropperPlaceholder');
      if (ph) ph.style.display = 'none';
    }

    /**
     * 不重载图片，仅更新裁剪框比例和尺寸
     * 在设备信息变更后调用
     */
    function refreshCropperAspectRatio(deviceW, deviceH) {
      if (!cropperInstance) return;
      const ratio = deviceW > 0 && deviceH > 0 ? deviceW / deviceH : NaN;
      cropperInstance.setAspectRatio(ratio);

      if (deviceW > 0 && deviceH > 0) {
        const container = cropperInstance.getContainerData();
        cropperInstance.setCropBoxData(
          calcCropBoxData(container.width, deviceW, deviceH)
        );
      }
      scheduleQuantize();
    }

    /* ══════════════════════════════════════════════════════════
     *  LUT & 图像量化
     * ══════════════════════════════════════════════════════════ */
    async function loadLUT() {
      try {
        const res = await fetch('lut/Spectra6_Render_LUT_Default_v2.bin');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        LUT_DATA = await res.arrayBuffer();
        const bytes = new Uint8Array(LUT_DATA);
        const head = Array.from(bytes.slice(0, 18)).map(b => b.toString(16).padStart(2, '0')).join(' ');
        log('✅ LUT 加载成功 | 大小:', LUT_DATA.byteLength, '字节 | 前18字节:', head);
      } catch (err) {
        log('LUT 加载失败:', err.message);
      }
    }

    /**
     * 量化核心：
     *   1. 通过 getCroppedCanvas 拿到已裁剪并缩放到设备分辨率的像素
     *   2. 亮度/对比度 → LUT → RgbQuant → 位深打包
     *   3. 更新右侧量化预览
     */
    async function quantizeImage() {
      if (!cropperInstance) return;

      const targetW = parseInt(document.getElementById('width').value);
      const targetH = parseInt(document.getElementById('height').value);

      if (!targetW || !targetH) {
        log('⚠️ 尚未获取设备尺寸，量化跳过');
        return;
      }
      if (devicePalette.length === 0) {
        log('⚠️ 调色板为空，量化跳过');
        return;
      }

      // 标记右侧为"更新中"
      const qBox = document.getElementById('quantizedBox');
      qBox.classList.add('updating');

      // ── Step 1：从 Cropper 获取精确尺寸的裁剪画布 ──────────
      const croppedCanvas = cropperInstance.getCroppedCanvas({
        width: targetW,
        height: targetH,
        imageSmoothingEnabled: true,
        imageSmoothingQuality: 'high',
      });

      if (!croppedCanvas) {
        log('⚠️ Cropper 尚未就绪');
        qBox.classList.remove('updating');
        return;
      }

      const ctx = croppedCanvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, targetW, targetH);
      const data = imageData.data;

      // ── Step 2：亮度 / 对比度 ────────────────────────────────
      const brightness = parseInt(document.getElementById('brightness').value);
      const contrast = parseInt(document.getElementById('contrast').value);
      if (brightness !== 0 || contrast !== 0) {
        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
        for (let i = 0; i < data.length; i += 4) {
          for (let c = 0; c < 3; c++) {
            let v = data[i + c] + brightness;
            v = factor * (v - 128) + 128;
            data[i + c] = Math.min(255, Math.max(0, Math.round(v)));
          }
        }
      }

      // ── Step 3：LUT 色彩校正 ─────────────────────────────────
      if (useLut && LUT_DATA) {
        const gLut = new Uint8Array(LUT_DATA, 0x12);
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i + 1], b = data[i + 2];
          const idx = ((b >> 2) + ((g & 0xFC) << 4) + ((r & 0xFC) << 10)) * 3;
          data[i] = gLut[idx + 2];
          data[i + 1] = gLut[idx + 1];
          data[i + 2] = gLut[idx + 0];
        }
      }

      // ── Step 4：RgbQuant 量化 ────────────────────────────────
      const rq = new RgbQuant({
        colors: devicePalette.length,
        palette: devicePalette,
        reIndex: false,
        method: 1,
        dithKern: 'Stucki',
        dithDelta: 0,
        dithSerp: true,
        useCache: false,
      });

      const indexData = rq.reduce(imageData, 2);
      const pixelCount = targetW * targetH;
      const colorCount = devicePalette.length;
      let packedData;

      // ── Step 5：位深打包 ─────────────────────────────────────
      if (colorCount <= 2) {
        // 1bpp：8 像素 / 字节
        packedData = new Uint8Array(Math.ceil(pixelCount / 8));
        for (let i = 0; i < pixelCount; i++) {
          packedData[Math.floor(i / 8)] |= ((indexData[i] & 1) << (7 - i % 8));
        }
      } else if (colorCount <= 4) {
        // 2bpp：4 像素 / 字节（行对齐）
        const stride = targetW / 4;
        packedData = new Uint8Array(stride * targetH);
        for (let y = 0; y < targetH; y++) {
          for (let x = 0; x < targetW; x++) {
            let val = (indexData[y * targetW + x] ?? 0) & 0x03;
            if (colorCount === 3 && val === 2) val = 3; // 3色屏红色映射
            const byteIdx = y * stride + Math.floor(x / 4);
            const bitShift = (3 - (x % 4)) * 2;
            if (x % 4 === 0) packedData[byteIdx] = 0;
            packedData[byteIdx] |= (val << bitShift);
          }
        }
      } else {
        // 4bpp：2 像素 / 字节
        packedData = new Uint8Array(Math.ceil(pixelCount / 2));
        for (let i = 0; i < pixelCount; i++) {
          packedData[Math.floor(i / 2)] |= ((indexData[i] & 0x0F) << ((1 - i % 2) * 4));
        }
      }

      outputData = packedData;
      log(`✅ 量化完成，输出 ${outputData.length} 字节`);

      // ── Step 6：渲染量化预览 ─────────────────────────────────
      const visualData = rq.reduce(imageData);
      imageData.data.set(visualData);
      ctx.putImageData(imageData, 0, 0);

      const qImg = document.getElementById('quantizedImage');
      qImg.src = croppedCanvas.toDataURL();
      qImg.style.display = 'block';

      const qph = document.getElementById('quantizedPlaceholder');
      if (qph) qph.style.display = 'none';

      qBox.classList.remove('updating');
    }

    /** 防抖：停止操作 0.5s 后触发量化 */
    let quantizeTimer = null;
    function scheduleQuantize() {
      clearTimeout(quantizeTimer);
      quantizeTimer = setTimeout(quantizeImage, 500);
    }

    /* ══════════════════════════════════════════════════════════
     *  高级模式
     * ══════════════════════════════════════════════════════════ */
    const advancedEls = [
      document.getElementById('bleFilter'),
      document.getElementById('setdevice'),
      document.getElementById('advancedImageOps'),
      document.getElementById('getIPBtn'),
      document.getElementById('sendBtnBle'),
      document.getElementById('saveToFlashBtn'),
      document.getElementById('clearFlashBtn'),
      document.getElementById('ClearBtn'),
      document.getElementById('status'),
      document.getElementById('flipControl'),
    ];

    document.getElementById('advancedMode').addEventListener('change', (e) => {
      const on = e.target.checked;
      advancedEls.forEach(el => { if (el) el.hidden = !on; });
      localStorage.setItem('advancedMode', on ? '1' : '0');
    });

    /* ══════════════════════════════════════════════════════════
     *  页面初始化
     * ══════════════════════════════════════════════════════════ */
    window.addEventListener('DOMContentLoaded', () => {
      const advOn = localStorage.getItem('advancedMode') === '1';
      document.getElementById('advancedMode').checked = advOn;
      advancedEls.forEach(el => { if (el) el.hidden = !advOn; });

      const savedSSID = localStorage.getItem('saved_ssid');
      const savedPass = localStorage.getItem('saved_password');
      if (savedSSID) document.getElementById('ssid').value = savedSSID;
      if (savedPass) document.getElementById('password').value = savedPass;

      updateBleStatus('disconnected');
      loadLUT();

      /* ══════════════════════════════════════════════════════════
       *  状态按钮弹窗控制
       * ══════════════════════════════════════════════════════════ */
      const statusBtns = document.querySelectorAll('.status-btn');
      const statusWindows = document.querySelectorAll('.status-window');

      statusBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const targetId = btn.dataset.target;
          const targetWindow = document.getElementById(targetId);
          
          if (!targetWindow) return;

          const isActive = targetWindow.classList.contains('active');

          statusWindows.forEach(window => {
            window.classList.remove('active');
          });

          if (!isActive) {
            targetWindow.classList.add('active');
          }
        });
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.status-btn') && !e.target.closest('.status-window')) {
          statusWindows.forEach(window => {
            window.classList.remove('active');
          });
        }
      });
    });

    /* ══════════════════════════════════════════════════════════
     *  事件：图片上传 → Cropper 初始化
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('uploadImageBtn').addEventListener('click', () => {
      document.getElementById('imageInput').click();
    });

    document.getElementById('imageInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        const imgEl = document.getElementById('cropperImage');

        // 销毁旧实例，以便 Cropper 重新接管 img
        if (cropperInstance) {
          cropperInstance.destroy();
          cropperInstance = null;
          // Cropper 会恢复 img 的原始状态，重置 src 即可
        }

        imgEl.onload = () => initCropper(imgEl);
        imgEl.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    /* ══════════════════════════════════════════════════════════
     * 事件：旋转控制
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('rotateLeft').addEventListener('click', () => {
      if (cropperInstance) {
        // 左转：相对旋转 -90 度
        cropperInstance.rotate(-90);
        scheduleQuantize(); // 旋转后触发量化更新
      }
    });

    document.getElementById('rotateRight').addEventListener('click', () => {
      if (cropperInstance) {
        // 右转：相对旋转 +90 度
        cropperInstance.rotate(90);
        scheduleQuantize(); // 旋转后触发量化更新
      }
    });

    document.getElementById('flipHorizontal').addEventListener('click', () => {
      if (cropperInstance) {
        // 获取当前的 scaleX 状态，默认为 1
        const data = cropperInstance.getData();
        const currentScaleX = data.scaleX || 1;

        // 设置为相反数 (1 变 -1, -1 变 1)
        cropperInstance.scaleX(-currentScaleX);

        scheduleQuantize(); // 镜像后触发量化更新
      }
    });

    // 上下镜像 (垂直翻转)
    document.getElementById('flipVertical').addEventListener('click', () => {
      if (cropperInstance) {
        // 获取当前的 scaleY 状态，默认为 1
        const data = cropperInstance.getData();
        const currentScaleY = data.scaleY || 1;

        // 设置为相反数
        cropperInstance.scaleY(-currentScaleY);

        scheduleQuantize(); // 镜像后触发量化更新
      }
    });

    /* ══════════════════════════════════════════════════════════
     *  事件：亮度 / 对比度 / LUT
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('brightness').addEventListener('input', (e) => {
      document.getElementById('brightnessVal').textContent = e.target.value;
      scheduleQuantize();
    });
    document.getElementById('contrast').addEventListener('input', (e) => {
      document.getElementById('contrastVal').textContent = e.target.value;
      scheduleQuantize();
    });
    document.querySelectorAll('.step-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.value = Math.min(100, Math.max(-100, +input.value + +btn.dataset.step));
        input.dispatchEvent(new Event('input'));
      });
    });
    document.getElementById('useLutCheckbox').addEventListener('change', (e) => {
      useLut = e.target.checked;
      log(`LUT: ${useLut ? '开启' : '关闭'}`);
      scheduleQuantize();
    });
    document.getElementById('quantizedImagebtn').addEventListener('click', quantizeImage);

    /* ══════════════════════════════════════════════════════════
     *  事件：蓝牙扫描
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('scanBLEBtn').addEventListener('click', async (event) => {
      event.stopPropagation();
      event.preventDefault();
      if (!BLE.isSupported()) return;

      let serviceUuid = document.querySelector('#service').value;
      if (serviceUuid.startsWith('0x')) serviceUuid = parseInt(serviceUuid);

      const filters = [];
      if (serviceUuid) filters.push({ services: [serviceUuid] });
      const fn = document.querySelector('#name').value;
      if (fn) filters.push({ name: fn });
      const fp = document.querySelector('#namePrefix').value;
      if (fp) filters.push({ namePrefix: fp });

      const scanOptions = document.querySelector('#allDevices').checked
        ? { acceptAllDevices: true }
        : { filters };

      console.clear();

      try {
        await BLE.connect(scanOptions, {
          serviceUuid, txUuid: 0xFF05, rxUuid: 0xFF04, statusUuid: 0xFF01,
        });
      } catch (e) {
        log(`❌ 蓝牙连接失败: ${e.message}`);
        alert('获取蓝牙服务失败，请检查服务UUID是否正确');
        return;
      }

      try {
        const info = await EPD.getDeviceInfo();
        applyDeviceInfoToUI(info);
      } catch (e) {
        log(`❌ 获取设备信息失败: ${e.message}`);
        if (e.message.includes('空数据')) alert('❌ 读取到空数据，可能是新设备，需要先设置型号');
      }
    });

    /* ══════════════════════════════════════════════════════════
     *  事件：WiFi
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('setWifiBtn').addEventListener('click', async () => {
      const ssid = document.getElementById('ssid').value;
      const pwd = document.getElementById('password').value;
      if (!ssid || !pwd) { alert('请先输入完整的 SSID 和密码'); return; }
      if (!BLE.state.ch_tx) { alert('蓝牙未连接'); return; }

      localStorage.setItem('saved_ssid', ssid);
      localStorage.setItem('saved_password', pwd);

      try { await EPD.setWifi(ssid, pwd); }
      catch (e) { log(`❌ WiFi 指令发送失败: ${e.message}`); return; }

      overlay.show();
      overlay.update('正在连接 WiFi，请稍候...');
      await new Promise(r => setTimeout(r, 2000));

      try {
        const ip = await EPD.waitForIp(msg => overlay.update(msg), 2000, 60000);
        BLE.state.deviceIp = ip;
        document.getElementById('ipAddress').value = ip;
        log(`🌐 WiFi 连接成功！IP: ${ip}`);
        await overlay.complete(`WiFi 连接成功！IP: ${ip}`);
      } catch (e) {
        log(`❌ ${e.message}`);
        await overlay.fail('WiFi 连接失败');
      }
    });

    document.getElementById('getIPBtn').addEventListener('click', async () => {
      document.getElementById('ipAddress').value = '';
      try {
        const ip = await EPD.getIp(5000);
        if (ip === '0.0.0.0') {
          log(`⚠️ 尚未获取到 IP (当前: ${ip})`);
        } else {
          BLE.state.deviceIp = ip;
          document.getElementById('ipAddress').value = ip;
          log(`🌐 IP: ${ip}`);
        }
      } catch (e) { log(`❌ 获取 IP 失败: ${e.message}`); }
    });

    /* ══════════════════════════════════════════════════════════
     *  事件：设备配置命令
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('setdeviceBtn').addEventListener('click', async () => {
      const name = document.getElementById('modelSet').value.trim();
      if (!name) { alert('请先确保型号信息已读取'); return; }
      try { await EPD.setDeviceName(name); }
      catch (e) { log(`❌ 型号设置失败: ${e.message}`); }
    });

    document.getElementById('setCustomNameBtn').addEventListener('click', async () => {
      const name = document.getElementById('customName').value.trim();
      if (!name) { alert('请先输入自定义名称'); return; }
      try { await EPD.setCustomName(name); }
      catch (e) { log(`❌ 自定义名称设置失败: ${e.message}`); }
    });

    document.getElementById('setModeBtn').addEventListener('click', async () => {
      const mode = parseInt(document.getElementById('woringModeSet').value);
      try { await EPD.setWorkingMode(mode); log('✅ 工作模式设置成功'); }
      catch (e) { log(`❌ 工作模式设置失败: ${e.message}`); alert(`发送失败: ${e.message}`); }
    });

    document.getElementById('ClearBtn').addEventListener('click', async () => {
      if (!BLE.state.ch_tx) { alert('蓝牙未连接！'); return; }
      try { await EPD.clearScreen(selectedPaletteIndex); }
      catch (e) { log(`❌ 清屏失败: ${e.message}`); }
    });

    /* ══════════════════════════════════════════════════════════
     *  事件：发送图像 BLE
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('sendBtnBle').addEventListener('click', async () => {
      if (!outputData?.length) { alert('请先进行图片量化！'); return; }
      if (!BLE.state.ch_tx) { alert('蓝牙未连接！'); return; }
      overlay.show();
      try {
        await EPD.sendImageBle(outputData, pct => overlay.update(pct.toFixed(1)));
        await overlay.complete('同步成功');
      } catch (e) {
        log(`❌ 发送失败: ${e.message}`);
        await overlay.fail('蓝牙异常');
      }
    });

    /* ══════════════════════════════════════════════════════════
     *  事件：发送图像 WiFi
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('sendBtnIP').addEventListener('click', async () => {
      const targetIp = BLE.state.deviceIp || document.getElementById('ipAddress').value;
      if (!targetIp || targetIp === '0.0.0.0') { alert('请先获取有效的设备 IP！'); return; }
      if (!outputData?.length) { alert('请先进行图片量化！'); return; }

      const startTime = Date.now();
      log(`🚀 WiFi 发送开始，${outputData.length} 字节...`);
      overlay.show();
      overlay.update('0%');

      let progressTimer = null;
      if (BLE.state.ch_tx && BLE.state.ch_rx) {
        progressTimer = setInterval(async () => {
          try {
            const pct = await EPD.queryProgress();
            log(`📊 WiFi 传输进度: ${pct}%`);
            overlay.update(pct.toString());
          } catch (e) { console.warn('查询进度失败:', e); }
        }, 2000);
      }

      try {
        const res = await fetch(`http://${targetIp}/upload_epd`, {
          method: 'POST', body: outputData,
          headers: { 'Content-Type': 'application/octet-stream' },
          signal: AbortSignal.timeout(300000),
        });
        clearInterval(progressTimer);
        if (res.ok) {
          const txt = await res.text();
          log(`✅ 发送成功！耗时 ${((Date.now() - startTime) / 1000).toFixed(2)}s，回复: ${txt}`);
          await overlay.complete('同步成功');
        } else {
          throw new Error(`服务器响应错误: ${res.status}`);
        }
      } catch (e) {
        clearInterval(progressTimer);
        log(`❌ WiFi 发送失败: ${e.message}`);
        await overlay.fail('WiFi 异常');
      }
    });

    /* ══════════════════════════════════════════════════════════
     *  事件：Flash 操作
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('saveToFlashBtn').addEventListener('click', async () => {
      const ip = BLE.state.deviceIp || document.getElementById('ipAddress').value;
      if (!ip || ip === '0.0.0.0') { alert('未获取到设备 IP'); return; }
      const now = new Date();
      const ts = [now.getFullYear(), now.getMonth() + 1, now.getDate(),
      now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join('');
      overlay.show(); overlay.update('正在持久化...');
      try {
        const res = await fetch(`http://${ip}/save_image?time=${ts}`, { method: 'POST' });
        if (res.ok) { await overlay.complete(`已保存: ${ts}`); }
        else { throw new Error('服务器保存失败'); }
      } catch (e) { await overlay.fail(e.message); }
    });

    document.getElementById('clearFlashBtn').addEventListener('click', async () => {
      if (!confirm('确定要删除 Flash 中保存的所有图片吗？此操作不可撤销。')) return;
      const ip = BLE.state.deviceIp || document.getElementById('ipAddress').value;
      if (!ip || ip === '0.0.0.0') { alert('未连接 WiFi 或未输入 IP'); return; }
      overlay.show(); overlay.update('正在格式化/清空...');
      try {
        const res = await fetch(`http://${ip}/clear_flash`, { method: 'POST' });
        const text = await res.text();
        if (res.ok) {
          await overlay.complete(text.includes('scheduled') ? '刷屏中，清空任务已排队...' : 'Flash 已清空');
        } else { throw new Error('清空失败'); }
      } catch (e) { await overlay.fail(e.message); }
    });

    /* ══════════════════════════════════════════════════════════
     *  事件：Bin 导出 / 导入（从 Bin 反向还原预览图）
     * ══════════════════════════════════════════════════════════ */
    document.getElementById('exportBinBtn').addEventListener('click', () => {
      if (!outputData?.length) { alert('请先进行图片量化！'); return; }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([outputData], { type: 'application/octet-stream' }));
      a.download = `image_${document.getElementById('width').value}x${document.getElementById('height').value}.bin`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 0);
      log('✅ BIN 文件已导出');
    });

    document.getElementById('importBinBtn').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const importedData = new Uint8Array(await file.arrayBuffer());
      const w = parseInt(document.getElementById('width').value);
      const h = parseInt(document.getElementById('height').value);
      const cc = devicePalette.length;

      if (!w || !h || cc === 0) {
        alert('请先确保设备信息已读取（宽/高/调色板）'); return;
      }
      log(`开始反向还原: ${importedData.length} 字节 → ${w}×${h}`);

      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      const imageData = ctx.createImageData(w, h);
      const rgba = imageData.data;

      for (let i = 0; i < w * h; i++) {
        let pi = 0;
        if (cc <= 2) {
          pi = (importedData[Math.floor(i / 8)] >> (7 - i % 8)) & 0x01;
        } else if (cc <= 4) {
          pi = (importedData[Math.floor(i / 4)] >> ((3 - i % 4) * 2)) & 0x03;
          if (cc === 3 && pi === 3) pi = 2;
        } else {
          pi = (importedData[Math.floor(i / 2)] >> ((1 - i % 2) * 4)) & 0x0F;
        }
        const rgb = devicePalette[pi] || [0, 0, 0];
        const off = i * 4;
        rgba[off] = rgb[0]; rgba[off + 1] = rgb[1]; rgba[off + 2] = rgb[2]; rgba[off + 3] = 255;
      }

      ctx.putImageData(imageData, 0, 0);
      const qImg = document.getElementById('quantizedImage');
      qImg.src = canvas.toDataURL();
      qImg.style.display = 'block';
      const qph = document.getElementById('quantizedPlaceholder');
      if (qph) qph.style.display = 'none';
      log('✅ 图像反向还原成功');
    });

  </script>
</body>
