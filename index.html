<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLE 电子纸</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="mainContainer">
    <div id="advancedToggle">
      <span>高级模式</span>
      <label class="toggle-switch">
        <input type="checkbox" id="advancedMode">
        <span class="toggle-thumb"></span>
      </label>
    </div>
    <div id="transferOverlay" class="overlay" style="display: none;">
      <div id="loaderBox" class="loader-container">
        <div class="spinner">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="loader-text">
          <div id="loaderProgress">0%</div>
          <div id="loaderTime">0.0s</div>
        </div>
        <div id="statusText" class="status-msg"></div>
      </div>
    </div>

    <h1>Web BLE 电子纸</h1>

    <div id="bleInfo" class="control-group">
      <form>
        <div class="row" id="bleFilter">
          <label for="allDevices">All Devices</label>
          <input id="allDevices" type="checkbox">
          <input id="service" type="text" list="services" placeholder="Bluetooth Service" value="0x00FF">
          <input id="characteristic" type="text" list="services" placeholder="Bluetooth Characteristic">
          <input id="name" type="text" placeholder="Device Name" hidden=true>
          <input id="namePrefix" type="text" placeholder="Device Name Prefix" value="YES">
        </div>
        <!-- 蓝牙连接状态指示器 -->
        <div id="bleStatusIndicator" class="ble-status">
          <span class="status-dot"></span>
          <span class="status-text">蓝牙未连接</span>
        </div>
        <div class="row">
          <label>Scan Bluetooth Devices</label>
          <button id="scanBLEBtn">Scan</button>
        </div>
      </form>
    </div>

    <br>
    <div id="wifiInfo" class="control-group">
      <div class="row">
        <label>SSID:</label>
        <input id="ssid" type="text" value="Outside">
        <label>Password:</label>
        <input id="password" type="text" value="yeslcd123">
      </div>
      <div class="row">
        <label>IP: </label>
        <input id="ipAddress" type="text" readonly>
        <button id="getIPBtn">Get IP</button>
        <button id="setWifiBtn">Set WiFi</button>
      </div>
    </div>

    <br>
    <div id="setdevice" class="control-group">
      <div class="row">
        <label>Model Name: </label>
        <select id="modelSet"></select>
        <button id="setdeviceBtn">Set Device</button>
      </div>
      <div class="row">
        <label>Custom Name: </label>
        <input id="customName" type="text" placeholder="Custom Name">
        <button id="setCustomNameBtn">Set Custom Name</button>
      </div>
      <div class="row">
        <label>工作模式:</label>
        <select id="woringModeSet">
          <option value="0">0: 正常模式</option>
          <option value="1">1: 相册模式</option>
        </select>
        <button id="setModeBtn">Set Mode</button>
      </div>
    </div>

    <br>
    <div id="deviceInfo" class="control-group">
      <div class="row">
        <label>型号:</label>
        <input id="modelGet" type="text" readonly>
        <button id="getinfobtn" hidden="true">Get Info</button>
      </div>
      <div class="row">
        <label>宽:</label>
        <input id="width" type="text" readonly>
        <label>高:</label>
        <input id="height" type="text" readonly>
        <label>BPP:</label>
        <input id="BPP" type="text" readonly>
      </div>
      <div class="row">
        <label>调色板:</label>
        <span id="paletteContainer" style="display: inline-flex; gap: 5px; margin-left: 10px;">
          <div style="width: 20px; height: 20px; background-color: #FF0000;"></div>
          <div style="width: 20px; height: 20px; background-color: #00FF00;"></div>
          <div style="width: 20px; height: 20px; background-color: #0000FF;"></div>
          <div style="width: 20px; height: 20px; background-color: #FFFFFF;"></div>
          <div style="width: 20px; height: 20px; background-color: #000000;"></div>
        </span>
        <button id="ClearBtn">Clear Screen</button>
      </div>
    </div>

    <div id="imagePreviewsContainer">
      <!-- 原图预览 -->
      <div class="preview-box">
        <span class="placeholder">📷 原图</span>
        <img id="previewImage" src="" alt="原图">
      </div>

      <!-- 量化图预览 -->
      <div class="preview-box">
        <span class="placeholder">📊 量化图</span>
        <img id="quantizedImage" src="" alt="量化图">
      </div>

      <input type="file" id="imageInput" accept="image/*" style="display: none;">
    </div>

    <div class="adjust-controls">
      <label class="lut-label">色彩增强 (LUT) <input type="checkbox" id="useLutCheckbox" checked></label>

      <div class="slider-row">
        <label>亮度 <span id="brightnessVal">0</span></label>
        <button class="step-btn" data-target="brightness" data-step="-1">−</button>
        <input type="range" id="brightness" min="-100" max="100" value="0">
        <button class="step-btn" data-target="brightness" data-step="1">+</button>
      </div>
      <div class="slider-row">
        <label>对比度 <span id="contrastVal">0</span></label>
        <button class="step-btn" data-target="contrast" data-step="-1">−</button>
        <input type="range" id="contrast" min="-100" max="100" value="0">
        <button class="step-btn" data-target="contrast" data-step="1">+</button>
      </div>
    </div>

    <div id="advancedImageOps" style="margin-top: 10px;" class="control-group">
      <button id="exportBinBtn">Export Bin</button>
      <button id="importBinBtn">Import Bin</button>
      <input type="file" id="fileInput" style="display: none;" accept=".bin">
      <button id="quantizedImagebtn">Quantized Image</button>
    </div>

    <br>
    <br>
    <button id="saveToFlashBtn" class="btn">保存到 Flash</button>
    <button id="clearFlashBtn" class="btn" style="background-color: #e74c3c;">清空 Flash 图片</button>
    <button id="sendBtnBle">Send Image (Bluetooth)</button>
    <button id="sendBtnIP">Send Image (IP)</button>

    <br>
    <br>
    <br>
    <br>
    <br>
    <footer style="text-align: center; margin-top: 20px; font-size: 14px;">
      <span>Powered by</span>
      <a href="https://www.yes-lcd.com/" target="_blank" style="vertical-align: middle; text-decoration: none;">
        <img src="assets/yes-lcd.jpg" alt="Company Logo" style="height: 32px; margin-left: 5px;">
      </a>
      <a href="https://www.newface-epd.com" target="_blank" style="vertical-align: middle; text-decoration: none;">
        <img src="assets/newface-epd.png" alt="Company Logo" style="height: 32px; margin-left: 5px;">
      </a>
    </footer>
    <br>
    <br>
    <br>
    <br>

    <div id="status">状态：等待操作...</div>
  </div>

  <!-- ── 第三方库 ─────────────────────────────────────────────────── -->
  <script src="libs/RgbQuant/src/rgbquant.js"></script>

  <!-- ── 蓝牙底层 & 协议层（必须先于 UI 逻辑加载）────────────────── -->
  <script src="蓝牙操作.js"></script>
  <script src="协议.js"></script>

  <!-- ── UI 层 ───────────────────────────────────────────────────── -->
  <script>
    /* ══════════════════════════════════════════════════════════════════
     *  应用状态（仅 UI / 图像处理 相关）
     * ══════════════════════════════════════════════════════════════════ */
    let LUT_DATA = null;   // ArrayBuffer，LUT 色彩查找表
    let useLut = true;
    let devicePalette = [];     // [[r,g,b], ...]，来自设备信息
    let outputData = null;   // Uint8Array，量化打包后的图像数据
    let selectedPaletteIndex = 0;

    /* ══════════════════════════════════════════════════════════════════
     *  初始化 BLE 和协议库
     * ══════════════════════════════════════════════════════════════════ */
    BLE.init({
      log: log,
      onStatusChange: updateBleStatus,
      onNotification: (event) => {
        const result = EPD.handleNotification(event);
        log(result.message);
      },
    });

    EPD.init({ log });

    /* ── 型号下拉列表 ──────────────────────────────────────────────── */
    const modelSelect = document.getElementById('modelSet');
    EPD.MODEL_LIST.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      modelSelect.appendChild(opt);
    });

    /* ══════════════════════════════════════════════════════════════════
     *  传输进度遮罩层（Overlay）
     * ══════════════════════════════════════════════════════════════════ */
    const overlay = {
      get el() { return document.getElementById('transferOverlay'); },
      get box() { return document.getElementById('loaderBox'); },
      get progress() { return document.getElementById('loaderProgress'); },
      get time() { return document.getElementById('loaderTime'); },
      get status() { return document.getElementById('statusText'); },

      startTime: 0,
      timerInterval: null,

      show() {
        if (!this.el || !this.box) {
          console.error('❌ 找不到遮罩层元素');
          return;
        }
        this.box.className = 'loader-container';
        this.el.classList.remove('hidden');
        this.el.style.display = 'flex';
        this.status.innerText = '';
        this.progress.style.display = 'block';
        this.startTime = Date.now();

        this.timerInterval = setInterval(() => {
          const diff = ((Date.now() - this.startTime) / 1000).toFixed(1);
          this.time.innerText = `${diff}s`;
        }, 100);
      },

      update(percent) {
        if (this.progress) this.progress.innerText = `${percent}%`;
      },

      async complete(msg = '传输成功') {
        clearInterval(this.timerInterval);
        this.box.classList.add('success');
        this.status.innerText = `✅ ${msg}`;
        this.progress.style.display = 'none';

        await new Promise(r => setTimeout(r, 2000));
        this.el.classList.add('hidden');
        setTimeout(() => this.el.style.display = 'none', 500);
      },

      async fail(msg = '传输失败') {
        clearInterval(this.timerInterval);
        if (!this.box || !this.el) return;
        this.box.classList.add('warning');
        this.status.innerText = `⚠️ ${msg}`;
        this.progress.style.display = 'none';

        await new Promise(r => setTimeout(r, 2000));
        this.el.classList.add('hidden');
        setTimeout(() => this.el.style.display = 'none', 500);
      }
    };

    /* ══════════════════════════════════════════════════════════════════
     *  工具函数
     * ══════════════════════════════════════════════════════════════════ */

    /** 日志函数：带时间戳追加到 #status */
    function log(...args) {
      const statusDiv = document.getElementById('status');
      const now = new Date();
      const timestamp = `[${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}.${String(now.getMilliseconds()).padStart(3, '0')}]`;

      const message = args.map(arg => {
        try {
          return typeof arg === 'object' && arg !== null
            ? JSON.stringify(arg, null, 2)
            : String(arg);
        } catch (e) {
          return `[Unserializable: ${e.message}]`;
        }
      }).join(' ');

      if (statusDiv) {
        const line = document.createElement('div');
        line.textContent = ` ${timestamp} ${message}`;
        line.style.fontFamily = 'monospace';
        line.style.fontSize = '0.95em';
        statusDiv.appendChild(line);
        statusDiv.scrollTop = statusDiv.scrollHeight;
      } else {
        console.log(`${timestamp} ${message}`);
      }
    }

    /** 更新蓝牙状态指示器 UI */
    function updateBleStatus(state) {
      const dot = document.querySelector('.status-dot');
      const text = document.querySelector('.status-text');
      if (!dot || !text) return;

      dot.classList.remove('connected', 'connecting');

      switch (state) {
        case 'connecting':
          dot.classList.add('connecting');
          text.textContent = '蓝牙连接中...';
          break;
        case 'connected':
          dot.classList.add('connected');
          text.textContent = '蓝牙已连接';
          break;
        case 'disconnected':
          text.textContent = '蓝牙未连接';
          break;
        case 'error':
          text.textContent = '蓝牙连接出错';
          break;
      }
    }

    /** 将设备信息写入页面 UI，并渲染调色板 */
    function applyDeviceInfoToUI(info) {
      document.getElementById('modelGet').value = info.name;
      document.getElementById('width').value = info.width;
      document.getElementById('height').value = info.height;
      document.getElementById('BPP').value = info.bpp;

      devicePalette = info.palette;

      const paletteContainer = document.getElementById('paletteContainer');
      if (!paletteContainer || !info.palette.length) return;

      paletteContainer.innerHTML = '';
      info.palette.forEach((rgb, index) => {
        const colorBox = document.createElement('div');
        colorBox.className = 'palette-item';
        colorBox.style.backgroundColor = `rgb(${rgb.join(',')})`;
        colorBox.dataset.index = index;

        if (index === selectedPaletteIndex) colorBox.classList.add('selected');

        colorBox.onclick = () => {
          document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('selected'));
          colorBox.classList.add('selected');
          selectedPaletteIndex = index;
          log(`已选中调色板颜色索引: ${index}`);
        };

        paletteContainer.appendChild(colorBox);
      });

      log('✅ UI 设备信息更新完成');
    }

    /* ══════════════════════════════════════════════════════════════════
     *  LUT 加载 & 图像处理
     * ══════════════════════════════════════════════════════════════════ */

    async function loadLUT() {
      try {
        const res = await fetch('lut/Spectra6_Render_LUT_Default_v2.bin');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        LUT_DATA = await res.arrayBuffer();
        const view = new Uint8Array(LUT_DATA);
        const head = Array.from(view.slice(0, 18)).map(b => b.toString(16).padStart(2, '0')).join(' ');
        log('✅ LUT 加载成功 | 大小:', LUT_DATA.byteLength, '字节 | 前18字节:', head);
      } catch (err) {
        log('LUT 加载失败:', err);
      }
    }

    /** 量化图像并将结果存入 outputData，同时更新量化预览 */
    async function quantizeImage() {
      const targetWidth = parseInt(document.getElementById('width').value);
      const targetHeight = parseInt(document.getElementById('height').value);

      if (!targetWidth || !targetHeight || devicePalette.length === 0) {
        alert('请先读取设备信息');
        return;
      }

      const img = document.getElementById('previewImage');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      ctx.drawImage(img, 0, 0, targetWidth, targetHeight);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      /* 亮度/对比度调整 */
      const brightness = parseInt(document.getElementById('brightness').value);
      const contrast = parseInt(document.getElementById('contrast').value);
      if (brightness !== 0 || contrast !== 0) {
        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
        for (let i = 0; i < data.length; i += 4) {
          for (let c = 0; c < 3; c++) {
            let v = data[i + c];
            v += brightness;
            v = factor * (v - 128) + 128;
            data[i + c] = Math.min(255, Math.max(0, Math.round(v)));
          }
        }
      }

      /* LUT 色彩校正 */
      if (useLut && LUT_DATA) {
        console.log('正在应用 LUT 色彩校正...');
        const g_lut_data = new Uint8Array(LUT_DATA, 0x12);

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          const lutIdx = ((b >> 2) + ((g & 0xFC) << 4) + ((r & 0xFC) << 10)) * 3;

          data[i] = g_lut_data[lutIdx + 2]; // R (LUT 存 BGR)
          data[i + 1] = g_lut_data[lutIdx + 1]; // G
          data[i + 2] = g_lut_data[lutIdx + 0]; // B
        }
      }

      /* RgbQuant 量化 */
      const rgbquant = new RgbQuant({
        colors: devicePalette.length,
        palette: devicePalette,
        reIndex: false,
        method: 1,
        dithKern: 'Stucki',
        dithDelta: 0,
        dithSerp: true,
        useCache: false
      });

      const indexData = rgbquant.reduce(imageData, 2);
      const pixelCount = targetWidth * targetHeight;
      const colorCount = devicePalette.length;
      let packedData;

      console.log(`像素总数: ${pixelCount}, 索引数组长度: ${indexData.length}, 颜色数: ${colorCount}`);

      /* 位深打包 */
      if (colorCount <= 2) {
        // 1bpp：8像素/字节
        packedData = new Uint8Array(Math.ceil(pixelCount / 8));
        for (let i = 0; i < pixelCount; i++) {
          const val = indexData[i] & 0x01;
          const byteIdx = Math.floor(i / 8);
          const bitShift = 7 - (i % 8);
          packedData[byteIdx] |= (val << bitShift);
        }
      } else if (colorCount <= 4) {
        // 2bpp：4像素/字节（行对齐）
        const stride = targetWidth / 4;
        packedData = new Uint8Array(stride * targetHeight);

        for (let y = 0; y < targetHeight; y++) {
          for (let x = 0; x < targetWidth; x++) {
            const pixelIdx = y * targetWidth + x;
            let val = (indexData[pixelIdx] !== undefined) ? (indexData[pixelIdx] & 0x03) : 0;

            // 3色屏特殊映射：索引2（红色）→ 0b11
            if (colorCount === 3 && val === 2) val = 3;

            const byteIdx = y * stride + Math.floor(x / 4);
            const bitShift = (3 - (x % 4)) * 2;

            if (x % 4 === 0) packedData[byteIdx] = 0;
            packedData[byteIdx] |= (val << bitShift);
          }
        }
      } else {
        // 4bpp：2像素/字节
        packedData = new Uint8Array(Math.ceil(pixelCount / 2));
        for (let i = 0; i < pixelCount; i++) {
          const val = indexData[i] & 0x0F;
          const byteIdx = Math.floor(i / 2);
          const bitShift = (1 - (i % 2)) * 4;
          packedData[byteIdx] |= (val << bitShift);
        }
      }

      outputData = packedData;
      console.log(`✅ 打包完成，输出 ${outputData.length} 字节`);

      /* 量化预览 */
      const visualData = rgbquant.reduce(imageData);
      imageData.data.set(visualData);
      ctx.putImageData(imageData, 0, 0);
      const qImg = document.getElementById('quantizedImage');
      qImg.src = canvas.toDataURL();
      qImg.style.display = 'block';
    }

    let adjustTimer = null;
    function scheduleQuantize() {
      clearTimeout(adjustTimer);
      adjustTimer = setTimeout(quantizeImage, 500);
    }

    /* ══════════════════════════════════════════════════════════════════
     *  高级模式切换
     * ══════════════════════════════════════════════════════════════════ */
    const advancedEls = [
      document.getElementById('bleFilter'),
      document.getElementById('setdevice'),
      document.getElementById('advancedImageOps'),
      document.getElementById('getIPBtn'),
      document.getElementById('sendBtnBle'),
      document.getElementById('saveToFlashBtn'),
      document.getElementById('clearFlashBtn'),
      document.getElementById('ClearBtn'),
      document.getElementById('status'),
    ];

    document.getElementById('advancedMode').addEventListener('change', (e) => {
      const on = e.target.checked;
      advancedEls.forEach(el => { if (el) el.hidden = !on; });
      localStorage.setItem('advancedMode', on ? '1' : '0');
    });

    /* ══════════════════════════════════════════════════════════════════
     *  页面初始化
     * ══════════════════════════════════════════════════════════════════ */
    window.addEventListener('DOMContentLoaded', () => {
      // 恢复高级模式
      const advOn = localStorage.getItem('advancedMode') === '1';
      document.getElementById('advancedMode').checked = advOn;
      advancedEls.forEach(el => { if (el) el.hidden = !advOn; });

      // 恢复 WiFi 凭证
      const savedSSID = localStorage.getItem('saved_ssid');
      const savedPass = localStorage.getItem('saved_password');
      if (savedSSID) document.getElementById('ssid').value = savedSSID;
      if (savedPass) document.getElementById('password').value = savedPass;

      // 初始蓝牙状态
      updateBleStatus('disconnected');

      // 加载 LUT
      loadLUT();
    });

    /* ══════════════════════════════════════════════════════════════════
     *  事件处理：蓝牙扫描 & 连接
     * ══════════════════════════════════════════════════════════════════ */
    document.getElementById('scanBLEBtn').addEventListener('click', async (event) => {
      event.stopPropagation();
      event.preventDefault();

      if (!BLE.isSupported()) return;

      /* 构建扫描参数 */
      let serviceUuid = document.querySelector('#service').value;
      if (serviceUuid.startsWith('0x')) serviceUuid = parseInt(serviceUuid);

      const filters = [];
      if (serviceUuid) filters.push({ services: [serviceUuid] });

      const filterName = document.querySelector('#name').value;
      if (filterName) filters.push({ name: filterName });

      const filterPrefix = document.querySelector('#namePrefix').value;
      if (filterPrefix) filters.push({ namePrefix: filterPrefix });

      const scanOptions = document.querySelector('#allDevices').checked
        ? { acceptAllDevices: true }
        : { filters };

      console.clear();

      try {
        /* 连接蓝牙，获取指定特征值 */
        await BLE.connect(scanOptions, {
          serviceUuid,
          txUuid: 0xFF05,
          rxUuid: 0xFF04,
          statusUuid: 0xFF01,
        });
      } catch (error) {
        log(`❌ 蓝牙连接失败: ${error.message}`);
        alert(`获取蓝牙服务失败，请检查服务UUID是否正确`);
        return;
      }

      /* 连接成功后立即获取设备信息 */
      try {
        const info = await EPD.getDeviceInfo();
        applyDeviceInfoToUI(info);
      } catch (error) {
        log(`❌ 获取设备信息失败: ${error.message}`);
        if (error.message.includes('空数据')) {
          alert('❌ 读取到空数据，可能是新设备，需要先设置型号');
        }
      }
    });

    /* ══════════════════════════════════════════════════════════════════
     *  事件处理：WiFi 配置
     * ══════════════════════════════════════════════════════════════════ */
    document.getElementById('setWifiBtn').addEventListener('click', async () => {
      const ssid = document.getElementById('ssid').value;
      const password = document.getElementById('password').value;

      if (!ssid || !password) { alert('请先输入完整的 SSID 和密码'); return; }
      if (!BLE.state.ch_tx) { alert('蓝牙未连接'); return; }

      localStorage.setItem('saved_ssid', ssid);
      localStorage.setItem('saved_password', password);

      try {
        await EPD.setWifi(ssid, password);
      } catch (error) {
        log(`❌ WiFi 指令发送失败: ${error.message}`);
        return;
      }

      overlay.show();
      overlay.update('正在连接 WiFi，请稍候...');

      // 等待设备启动再轮询
      await new Promise(r => setTimeout(r, 2000));

      try {
        const ip = await EPD.waitForIp(
          msg => overlay.update(msg),
          2000,   // 每 2 秒查一次
          60000   // 最多等 60 秒
        );
        BLE.state.deviceIp = ip;
        document.getElementById('ipAddress').value = ip;
        log(`🌐 WiFi 连接成功！IP: ${ip}`);
        await overlay.complete(`WiFi 连接成功！IP: ${ip}`);
      } catch (error) {
        log(`❌ ${error.message}`);
        await overlay.fail('WiFi 连接失败');
      }
    });

    document.getElementById('getIPBtn').addEventListener('click', async () => {
      document.getElementById('ipAddress').value = '';
      try {
        const ip = await EPD.getIp(5000);
        if (ip === '0.0.0.0') {
          log(`⚠️ 尚未获取到 IP，请检查 WiFi 是否连接成功 (当前: ${ip})`);
        } else {
          log(`🌐 获取成功! IP: ${ip}`);
          BLE.state.deviceIp = ip;
          document.getElementById('ipAddress').value = ip;
        }
      } catch (error) {
        log(`❌ 获取 IP 失败: ${error.message}`);
      }
    });

    /* ══════════════════════════════════════════════════════════════════
     *  事件处理：设备配置
     * ══════════════════════════════════════════════════════════════════ */
    document.getElementById('setdeviceBtn').addEventListener('click', async () => {
      const modelName = document.getElementById('modelSet').value.trim();
      if (!modelName) { alert('请先确保型号信息已读取（型号）'); return; }

      try {
        await EPD.setDeviceName(modelName);
      } catch (error) {
        log(`❌ 型号设置失败: ${error.message}`);
      }
    });

    document.getElementById('setCustomNameBtn').addEventListener('click', async () => {
      const customName = document.getElementById('customName').value.trim();
      if (!customName) { alert('请先输入自定义名称'); return; }

      try {
        await EPD.setCustomName(customName);
      } catch (error) {
        log(`❌ 自定义名称设置失败: ${error.message}`);
      }
    });

    document.getElementById('setModeBtn').addEventListener('click', async () => {
      const modeStr = document.getElementById('woringModeSet').value;
      if (!modeStr) { alert('请先选择工作模式'); return; }

      const modeInt = parseInt(modeStr);
      log(`当前选择的工作模式: ${modeInt}`);

      try {
        await EPD.setWorkingMode(modeInt);
        log('✅ 发送成功');
      } catch (error) {
        log(`❌ 发送失败: ${error.message}`);
        alert(`发送失败: ${error.message}`);
      }
    });

    document.getElementById('ClearBtn').addEventListener('click', async () => {
      if (!BLE.state.ch_tx) { alert('蓝牙未连接！'); return; }

      try {
        await EPD.clearScreen(selectedPaletteIndex);
      } catch (error) {
        log(`❌ 清屏指令发送失败: ${error.message}`);
      }
    });

    /* ══════════════════════════════════════════════════════════════════
     *  事件处理：图像发送（蓝牙）
     * ══════════════════════════════════════════════════════════════════ */
    document.getElementById('sendBtnBle').addEventListener('click', async () => {
      if (!outputData || outputData.length === 0) {
        alert('请先进行图片量化，生成输出数据！');
        return;
      }
      if (!BLE.state.ch_tx) {
        alert('蓝牙未连接或写入特性不可用！');
        return;
      }

      overlay.show();

      try {
        await EPD.sendImageBle(outputData, (pct) => overlay.update(pct.toFixed(1)));
        await overlay.complete('同步成功');
      } catch (error) {
        log(`❌ 发送失败: ${error.message}`);
        console.error(error);
        await overlay.fail('蓝牙异常');
      }
    });

    /* ══════════════════════════════════════════════════════════════════
     *  事件处理：图像发送（WiFi HTTP）
     * ══════════════════════════════════════════════════════════════════ */
    document.getElementById('sendBtnIP').addEventListener('click', async () => {
      const targetIp = BLE.state.deviceIp || document.getElementById('ipAddress').value;

      if (!targetIp || targetIp === '0.0.0.0') {
        alert('请先获取有效的设备 IP 地址！');
        return;
      }
      if (!outputData || outputData.length === 0) {
        alert('请先进行图片量化，生成输出数据！');
        return;
      }

      const url = `http://${targetIp}/upload_epd`;
      const startTime = Date.now();
      log(`🚀 开始 WiFi (HTTP) 发送，总计 ${outputData.length} 字节...`);

      overlay.show();
      overlay.update('0%');

      /* 蓝牙进度查询定时器 */
      let progressTimer = null;
      if (BLE.state.ch_tx && BLE.state.ch_rx) {
        progressTimer = setInterval(async () => {
          try {
            const pct = await EPD.queryProgress();
            log(`📊 WiFi 传输进度: ${pct}%`);
            overlay.update(pct.toString());
          } catch (e) {
            console.warn('查询进度失败:', e);
          }
        }, 2000);
      }

      try {
        const response = await fetch(url, {
          method: 'POST',
          body: outputData,
          headers: { 'Content-Type': 'application/octet-stream' },
          signal: AbortSignal.timeout(300000),
        });

        clearInterval(progressTimer);

        if (response.ok) {
          const result = await response.text();
          const duration = ((Date.now() - startTime) / 1000).toFixed(2);
          log(`✅ 发送成功！耗时 ${duration}s，服务器回复: ${result}`);
          await overlay.complete('同步成功');
        } else {
          throw new Error(`服务器响应错误: ${response.status}`);
        }
      } catch (error) {
        clearInterval(progressTimer);
        log(`❌ WiFi 发送失败: ${error.message}`);
        console.error(error);
        await overlay.fail('WiFi 异常');
      }
    });

    /* ══════════════════════════════════════════════════════════════════
     *  事件处理：Flash 操作
     * ══════════════════════════════════════════════════════════════════ */
    document.getElementById('saveToFlashBtn').addEventListener('click', async () => {
      const targetIp = BLE.state.deviceIp || document.getElementById('ipAddress').value;
      if (!targetIp || targetIp === '0.0.0.0') { alert('未获取到设备 IP'); return; }

      const now = new Date();
      const timestamp = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, '0'),
        String(now.getDate()).padStart(2, '0'),
        String(now.getHours()).padStart(2, '0'),
        String(now.getMinutes()).padStart(2, '0'),
        String(now.getSeconds()).padStart(2, '0'),
      ].join('');

      overlay.show();
      overlay.update('正在持久化...');

      try {
        const response = await fetch(`http://${targetIp}/save_image?time=${timestamp}`, {
          method: 'POST'
        });
        if (response.ok) {
          await overlay.complete(`已保存: ${timestamp}`);
        } else {
          throw new Error('服务器保存失败');
        }
      } catch (error) {
        await overlay.fail(error.message);
      }
    });

    document.getElementById('clearFlashBtn').addEventListener('click', async () => {
      if (!confirm('确定要删除 Flash 中保存的所有图片吗？此操作不可撤销。')) return;

      const targetIp = BLE.state.deviceIp || document.getElementById('ipAddress').value;
      if (!targetIp || targetIp === '0.0.0.0') { alert('未连接 WiFi 或未输入 IP'); return; }

      overlay.show();
      overlay.update('正在格式化/清空...');

      try {
        const response = await fetch(`http://${targetIp}/clear_flash`, { method: 'POST' });
        const resultText = await response.text();

        if (response.ok) {
          await overlay.complete(
            resultText.includes('scheduled')
              ? '刷屏中，清空任务已排队...'
              : 'Flash 已清空'
          );
        } else {
          throw new Error('清空失败');
        }
      } catch (error) {
        await overlay.fail(error.message);
      }
    });

    /* ══════════════════════════════════════════════════════════════════
     *  事件处理：Bin 文件导入/导出
     * ══════════════════════════════════════════════════════════════════ */
    document.getElementById('exportBinBtn').addEventListener('click', () => {
      if (!outputData || outputData.length === 0) { alert('请先进行图片量化！'); return; }

      const blob = new Blob([outputData], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `image_${document.getElementById('width').value}x${document.getElementById('height').value}.bin`;
      document.body.appendChild(a);
      a.click();

      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
      log('✅ BIN 文件已导出');
    });

    document.getElementById('importBinBtn').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const buffer = await file.arrayBuffer();
      const importedData = new Uint8Array(buffer);

      const w = parseInt(document.getElementById('width').value);
      const h = parseInt(document.getElementById('height').value);
      const colorCount = devicePalette.length;

      if (!w || !h || colorCount === 0) {
        alert('请先确保设备信息已读取（宽/高/调色板）');
        return;
      }

      log(`开始反向还原: ${importedData.length} 字节 → ${w}×${h} 图像`);

      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      const imageData = ctx.createImageData(w, h);
      const rgba = imageData.data;

      for (let i = 0; i < w * h; i++) {
        let paletteIndex = 0;

        if (colorCount <= 2) {
          const byte = importedData[Math.floor(i / 8)];
          paletteIndex = (byte >> (7 - (i % 8))) & 0x01;
        } else if (colorCount <= 4) {
          const byte = importedData[Math.floor(i / 4)];
          const shift = (3 - (i % 4)) * 2;
          paletteIndex = (byte >> shift) & 0x03;
          if (colorCount === 3 && paletteIndex === 3) paletteIndex = 2;
        } else {
          const byte = importedData[Math.floor(i / 2)];
          const shift = (1 - (i % 2)) * 4;
          paletteIndex = (byte >> shift) & 0x0F;
        }

        const rgb = devicePalette[paletteIndex] || [0, 0, 0];
        const offset = i * 4;
        rgba[offset] = rgb[0];
        rgba[offset + 1] = rgb[1];
        rgba[offset + 2] = rgb[2];
        rgba[offset + 3] = 255;
      }

      ctx.putImageData(imageData, 0, 0);
      const qImg = document.getElementById('quantizedImage');
      qImg.src = canvas.toDataURL();
      qImg.style.display = 'block';
      log('✅ 图像反向还原成功');
    });

    /* ══════════════════════════════════════════════════════════════════
     *  事件处理：图像选择 & 调整参数
     * ══════════════════════════════════════════════════════════════════ */
    document.querySelector('.preview-box').addEventListener('click', () => {
      document.getElementById('imageInput').click();
    });

    document.getElementById('imageInput').addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = document.getElementById('previewImage');
        img.src = e.target.result;
        img.style.display = 'block';

        const box = img.closest('.preview-box');
        const placeholder = box.querySelector('.placeholder');
        if (placeholder) placeholder.style.display = 'none';

        img.onload = quantizeImage;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('brightness').addEventListener('input', (e) => {
      document.getElementById('brightnessVal').textContent = e.target.value;
      scheduleQuantize();
    });
    document.getElementById('contrast').addEventListener('input', (e) => {
      document.getElementById('contrastVal').textContent = e.target.value;
      scheduleQuantize();
    });

    document.querySelectorAll('.step-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.value = Math.min(100, Math.max(-100, +input.value + +btn.dataset.step));
        input.dispatchEvent(new Event('input'));
      });
    });

    document.getElementById('quantizedImagebtn').addEventListener('click', quantizeImage);

    document.getElementById('useLutCheckbox').addEventListener('change', (e) => {
      useLut = e.target.checked;
      log(`LUT 状态更改为: ${useLut}`);
    });

  </script>
</body>

</html>
